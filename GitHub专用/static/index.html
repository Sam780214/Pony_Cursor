<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hi AI · 对话</title>
  <style>
    :root { --bg:#f4f6f9; --panel:#fff; --accent:#4f6ef7; --text:#1a1d26; --muted:#6b7280; --border:#e2e8f0; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:"Microsoft YaHei UI",system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    header { background:var(--panel); padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
    header h1 { margin:0; font-size:1.25rem; color:var(--accent); }
    #status { color:var(--muted); font-size:0.9rem; }
    .toolbar { margin-left:auto; display:flex; gap:8px; align-items:center; }
    select,button { font:inherit; padding:6px 12px; border-radius:6px; border:1px solid var(--border); background:var(--panel); cursor:pointer; }
    button.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    main { max-width:880px; margin:0 auto; padding:16px; display:flex; flex-direction:column; height:calc(100vh - 120px); }
    #chat { flex:1; overflow-y:auto; background:var(--panel); border-radius:10px; padding:16px; border:1px solid var(--border); }
    .msg { margin-bottom:14px; }
    .msg .who { font-weight:600; font-size:0.85rem; margin-bottom:4px; }
    .msg.user .who { color:var(--accent); }
    .msg.ai .who { color:#059669; }
    .msg.system .who { color:var(--muted); }
    .composer { margin-top:12px; }
    #input { width:100%; min-height:72px; padding:10px; border-radius:8px; border:1px solid var(--border); resize:vertical; font:inherit; }
    footer { text-align:center; color:var(--muted); font-size:0.8rem; padding:8px; }
    .msg.ai .body.streaming::after {
      content: '▋'; color: var(--accent); margin-left: 2px;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>
  <header>
    <h1 data-component="AppTitle">Hi AI</h1>
    <span id="status" data-component="ConnectionStatus">检查连接中…</span>
    <div class="toolbar">
      <label>模型 <select id="model" data-component="ModelSelect" aria-label="选择模型"></select></label>
      <button type="button" id="btn-clear" data-component="ClearButton">清空</button>
      <button type="button" id="btn-send" class="primary" data-component="SendButton">发送</button>
    </div>
  </header>
  <main>
    <div id="chat" data-component="ChatPanel" aria-live="polite"></div>
    <div class="composer">
      <textarea id="input" data-component="MessageInput" placeholder="输入消息… Enter 发送"></textarea>
    </div>
  </main>
  <footer>Hi AI · 本机 Ollama 对话</footer>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('input');
    const statusEl = document.getElementById('status');
    const modelSel = document.getElementById('model');
    let busy = false;
    function append(role, who, text) {
      const el = document.createElement('div');
      el.className = 'msg ' + role;
      el.innerHTML = '<div class="who">' + who + '</div><div class="body"></div>';
      el.querySelector('.body').textContent = text;
      chat.appendChild(el);
      chat.scrollTop = chat.scrollHeight;
    }
    async function api(path, opts) {
      const r = await fetch(path, opts);
      return r.json();
    }
    async function refreshHealth() {
      const d = await api('/api/health');
      statusEl.textContent = '● ' + d.message;
    }
    async function loadModels() {
      try {
        const d = await api('/api/models');
        modelSel.innerHTML = '';
        (d.models || []).forEach(m => {
          const o = document.createElement('option');
          o.value = m; o.textContent = m;
          modelSel.appendChild(o);
        });
        if (d.current) modelSel.value = d.current;
      } catch (e) { statusEl.textContent = '● 无法加载模型'; }
    }
    function parseSseBlocks(blocks, bodyEl) {
      for (const block of blocks) {
        const line = block.split('\n').find(l => l.startsWith('data: '));
        if (!line) continue;
        const data = JSON.parse(line.slice(6));
        if (data.error) throw new Error(data.error);
        if (data.token) {
          bodyEl.textContent += data.token;
          chat.scrollTop = chat.scrollHeight;
        }
      }
    }
    async function sendStream(message, model, bodyEl) {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 300000);
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, model }),
        signal: ctrl.signal
      });
      clearTimeout(timer);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      bodyEl.classList.add('streaming');
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      let finished = false;
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop() || '';
        for (const block of parts) {
          const line = block.split('\n').find(l => l.startsWith('data: '));
          if (!line) continue;
          const data = JSON.parse(line.slice(6));
          if (data.error) throw new Error(data.error);
          if (data.token) {
            bodyEl.textContent += data.token;
            chat.scrollTop = chat.scrollHeight;
          }
          if (data.done) { finished = true; bodyEl.classList.remove('streaming'); }
        }
      }
      if (buf.trim()) {
        const tail = buf.split('\n\n').filter(Boolean);
        parseSseBlocks(tail, bodyEl);
      }
      bodyEl.classList.remove('streaming');
      if (!bodyEl.textContent) bodyEl.textContent = '(空回复)';
      if (!finished && !bodyEl.textContent.startsWith('错误')) {
        throw new Error('连接意外结束');
      }
    }
    async function send() {
      if (busy) return;
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      append('user', '你', text);
      busy = true;
      document.getElementById('btn-send').disabled = true;
      input.disabled = true;
      const aiDiv = document.createElement('div');
      aiDiv.className = 'msg ai';
      aiDiv.innerHTML = '<div class="who">AI</div><div class="body"></div>';
      const body = aiDiv.querySelector('.body');
      chat.appendChild(aiDiv);
      try {
        await sendStream(text, modelSel.value, body);
      } catch (e) {
        body.classList.remove('streaming');
        body.textContent = '错误：' + (e.name === 'AbortError' ? '请求超时' : e);
      } finally {
        busy = false;
        document.getElementById('btn-send').disabled = false;
        input.disabled = false;
        chat.scrollTop = chat.scrollHeight;
      }
    }
    document.getElementById('btn-send').onclick = send;
    document.getElementById('btn-clear').onclick = async () => {
      await api('/api/clear', { method: 'POST' });
      chat.innerHTML = '';
      append('system', '系统', '对话已清空。');
    };
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    append('system', '系统', '欢迎使用 Hi AI Web。请确保本机 Ollama 已运行。');
    refreshHealth();
    loadModels();
  </script>
</body>
</html>
